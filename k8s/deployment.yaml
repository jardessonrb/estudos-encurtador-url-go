apiVersion: apps/v1
kind: Deployment
metadata:
  name: encurtador-url-go
  labels:
    app: encurtador-url-go
spec:
  replicas: 1
  selector:
    matchLabels:
      app: encurtador-url-go
  template:
    metadata:
      labels:
        app: encurtador-url-go
    spec:
      containers:
        - name: encurtador-url-go
          image: jardessonrb/encurtador-url-go:v6
          ports:
            - containerPort: 8080
          env:
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
            - name: DB_HOST
              value: postgres
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: encurtador-url-go
  labels:
    app: encurtador-url-go
spec:
  type: NodePort
  selector:
    app: encurtador-url-go
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: encurtador-url-go
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: encurtador-url-go
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
